version: '3.8'

services:
  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: clv_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlruns/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlruns/mlflow.db
      --default-artifact-root /mlflow/mlartifacts
    networks:
      - clv_network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: clv_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=clv_user
      - POSTGRES_PASSWORD=clv_password
      - POSTGRES_DB=clv_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clv_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clv_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clv_api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./configs:/app/configs
    environment:
      - DATABASE_URL=postgresql://clv_user:clv_password@postgres:5432/clv_database
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - clv_network

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: clv_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - clv_network

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: clv_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - clv_network

networks:
  clv_network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
